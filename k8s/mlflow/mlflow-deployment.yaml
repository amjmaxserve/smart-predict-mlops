apiVersion: apps/v1

kind: Deployment

metadata:
  name: mlflow
  namespace: smartpredict

  labels:
    app: mlflow

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mlflow

  template:

    metadata:
      labels:
        app: mlflow

    spec:

      containers:

      - name: mlflow

        image: ghcr.io/mlflow/mlflow:v2.13.0

        ports:
        - containerPort: 5000

        command:
          - mlflow

        args:
          - server
          - --host
          - 0.0.0.0
          - --port
          - "5000"
          - --backend-store-uri
          - sqlite:///mlflow.db
          - --default-artifact-root
          - s3://models/

        env:

        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: smartpredict-secrets
              key: MINIO_ACCESS_KEY

        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: smartpredict-secrets
              key: MINIO_SECRET_KEY

        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://minio-service:9000
